<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expenxe Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-center mb-4">💰 Expense Tracker</h2>
        <div class="card p-4 shadow">
            <input id="title"class="form-control mb-2" placeholder="Expense Title ">
            <input id="amount" type="number"class="form-control mb-2" placeholder="Amount">
            <select name="" id="category" class="form-control mb-2">
                <option value="Food">Food</option>
                <option value="Travel">Travel</option>
                <option value="Shopping">Shopping</option>
                <option value="Other">Other</option>
            </select>
            <button class="btn btn-primary" onclick="addExpense()">Add Expense</button>
        </div>
        <h4 class="mt-4">Total: ₹<span id="total">0</span></h4>
        <div id="list" class="mt-3"></div>

    </div>
    <script src="index.js"></script>
</body>
</html>
